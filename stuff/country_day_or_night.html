<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Day or Night Checker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #87ceeb, #f0f8ff);
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #333;
    }
    select, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
    .day {
      color: #ff9800;
    }
    .night {
      color: #3f51b5;
    }
  </style>
</head>
<body>
  <h1>🌍 Day or Night Checker</h1>
  <p>Select a country to see if it’s day or night there:</p>
  
  <select id="country">
    <option value="Asia/Kolkata">India</option>
    <option value="Europe/London">United Kingdom</option>
    <option value="America/New_York">United States (New York)</option>
    <option value="Asia/Tokyo">Japan</option>
    <option value="Australia/Sydney">Australia</option>
  </select>
  
  <button onclick="checkTime()">Check</button>
  
  <div id="result"></div>
  
  <script>
    async function checkTime() {
      const timezone = document.getElementById("country").value;
      const response = await fetch(`https://worldtimeapi.org/api/timezone/${timezone}`);
      const data = await response.json();
      
      const datetime = new Date(data.datetime);
      const hour = datetime.getHours();
      
      const resultDiv = document.getElementById("result");
      if (hour >= 6 && hour < 18) {
        resultDiv.textContent = "☀️ It's Daytime!";
        resultDiv.className = "day";
      } else {
        resultDiv.textContent = "🌙 It's Nighttime!";
        resultDiv.className = "night";
      }
    }
  </script>
</body>
</html>
